<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Frame compare — onion skin</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #1a1a1a; color: #aaa; font: 12px ui-monospace, SF Mono, monospace; padding: 16px; }
    .stage { position: relative; width: 100%; max-width: 1400px; margin: 0 auto 16px; }
    .stage-frame {
      position: relative; width: 100%; padding-bottom: 56.25%;
      background: #F1EFE8; box-shadow: 0 4px 30px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .stage-frame > svg, .stage-frame > img {
      position: absolute; inset: 0; width: 100%; height: 100%; display: block;
    }
    .stage-frame > img { z-index: 2; pointer-events: none; }
    .controls { max-width: 1400px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .controls > .group {
      display: flex; gap: 6px; align-items: center;
      padding: 4px 8px; border: 1px solid #333; border-radius: 4px;
    }
    button, input[type="number"] {
      background: #333; color: #ddd; border: 1px solid #555;
      padding: 5px 10px; border-radius: 3px; cursor: pointer; font: inherit;
    }
    button:hover { background: #444; }
    button.active { background: #5a7; color: #fff; border-color: #6c8; }
    input[type="number"] { width: 64px; cursor: text; }
    input[type="range"] { width: 140px; }
    label { display: flex; gap: 4px; align-items: center; cursor: pointer; }
    a { color: #88a; }
    pre { max-width: 1400px; margin: 12px auto 0; color: #666; background: #222;
          padding: 8px; border-radius: 4px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="stage">
   <div class="stage-frame">
    <svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="col-pattern" x="60" y="0" width="300" height="1080" patternUnits="userSpaceOnUse">
          <line x1="0" y1="0" x2="0" y2="1080" stroke="#E5E2D9" stroke-width="1"/>
        </pattern>

        <!-- Zoetrope tick pattern — edit width / inner rect width / fill
             to change tick spacing / thickness / color. -->
        <pattern id="tick-pattern" x="0" y="0" width="100" height="540" patternUnits="userSpaceOnUse">
          <rect x="0" y="0" width="4" height="540" fill="#F1EFE8"/>
        </pattern>
        <linearGradient id="grad-top" gradientUnits="userSpaceOnUse" x1="0" y1="360" x2="1920" y2="360">
          <stop id="stop-top-a" offset="0" stop-color="#9D9D9D"/>
          <stop id="stop-top-b" offset="1" stop-color="#9D9D9D"/>
        </linearGradient>
        <linearGradient id="grad-mid" gradientUnits="userSpaceOnUse" x1="0" y1="540" x2="1920" y2="540">
          <stop id="stop-mid-a" offset="0" stop-color="#9D9D9D"/>
          <stop id="stop-mid-b" offset="1" stop-color="#9D9D9D"/>
        </linearGradient>
        <linearGradient id="grad-bot" gradientUnits="userSpaceOnUse" x1="0" y1="720" x2="1920" y2="720">
          <stop id="stop-bot-a" offset="0" stop-color="#9D9D9D"/>
          <stop id="stop-bot-b" offset="1" stop-color="#9D9D9D"/>
        </linearGradient>
        <clipPath id="clip-dash-mid"><rect id="dash-mid-clip" x="1920" y="0" width="2600" height="1080"/></clipPath>
        <clipPath id="clip-dash-top"><rect id="dash-top-clip" x="1920" y="0" width="2600" height="1080"/></clipPath>
        <clipPath id="clip-dash-bot"><rect id="dash-bot-clip" x="1920" y="0" width="2600" height="1080"/></clipPath>
      </defs>

      <rect width="1920" height="1080" fill="#F1EFE8"/>
      <rect id="col-bg" width="1920" height="1080" fill="url(#col-pattern)" pointer-events="none"/>

      <path id="rail-mid" d="M2400 540 L0 540" stroke="url(#grad-mid)" stroke-width="180" fill="none"
            opacity="0" pathLength="1" stroke-dasharray="1 1" stroke-dashoffset="1"/>
      <path id="rail-top" d="M2400 360 L0 360" stroke="url(#grad-top)" stroke-width="180" fill="none"
            opacity="0" pathLength="1" stroke-dasharray="1 1" stroke-dashoffset="1"/>
      <path id="rail-bot" d="M2400 720 L0 720" stroke="url(#grad-bot)" stroke-width="180" fill="none"
            opacity="0" pathLength="1" stroke-dasharray="1 1" stroke-dashoffset="1"/>

      <path id="sleepers-mid" d="M2400 540 L0 540"
            stroke="rgba(0,0,0,0.12)" stroke-width="180" fill="none"
            stroke-dasharray="4 96" stroke-dashoffset="0" opacity="0" pointer-events="none"/>
      <path id="sleepers-top" d="M2400 360 L0 360"
            stroke="rgba(0,0,0,0.12)" stroke-width="180" fill="none"
            stroke-dasharray="4 96" stroke-dashoffset="0" opacity="0" pointer-events="none"/>
      <path id="sleepers-bot" d="M2400 720 L0 720"
            stroke="rgba(0,0,0,0.12)" stroke-width="180" fill="none"
            stroke-dasharray="4 96" stroke-dashoffset="0" opacity="0" pointer-events="none"/>

      <rect id="tick-overlay" x="0" y="270" width="1920" height="540"
            fill="url(#tick-pattern)" pointer-events="none"/>

      <path id="dash-mid" d="M-300 540 L2400 540" stroke="#000" stroke-width="1.27"
            stroke-dasharray="15.29 15.29" clip-path="url(#clip-dash-mid)"/>
      <path id="dash-top" d="M-300 360 L2400 360" stroke="#000" stroke-width="1.27"
            stroke-dasharray="15.29 15.29" clip-path="url(#clip-dash-top)"/>
      <path id="dash-bot" d="M-300 720 L2400 720" stroke="#000" stroke-width="1.27"
            stroke-dasharray="15.29 15.29" clip-path="url(#clip-dash-bot)"/>

      <line id="connector-up"   x1="912" y1="523" x2="912" y2="377"
            stroke="#000" stroke-width="1.3" stroke-dasharray="146" stroke-dashoffset="146"/>
      <line id="connector-down" x1="912" y1="557" x2="912" y2="703"
            stroke="#000" stroke-width="1.3" stroke-dasharray="146" stroke-dashoffset="146"/>

      <g id="label-top" opacity="0">
        <g id="marker-top">
          <circle id="marker-top-ring" cx="912" cy="360" r="9" fill="none" stroke="#000" stroke-width="3.5"/>
          <path id="marker-top-tri" d="M902 368 L922 368 L912 350 Z" fill="none" stroke="#000" stroke-width="3.5" opacity="0"/>
        </g>
        <g id="text-top-deploying" opacity="1">
          <text id="text-top-deploying-l1" x="933" y="354" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">Deploying</text>
          <text id="text-top-deploying-l2" x="933" y="378" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">frontend</text>
        </g>
        <g id="text-top-config" opacity="0">
          <text id="text-top-config-l1" x="933" y="354" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">Configuring…</text>
          <text id="text-top-config-l2" x="933" y="378" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">frontend</text>
        </g>
        <g id="text-top-deployed" opacity="0">
          <text id="text-top-deployed-l1" x="933" y="354" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">Deployed</text>
          <text id="text-top-deployed-l2" x="933" y="378" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">frontend</text>
        </g>
      </g>

      <g id="label-mid" opacity="0">
        <g id="marker-mid">
          <circle id="marker-mid-ring" cx="912" cy="540" r="9" fill="none" stroke="#000" stroke-width="3.5"/>
          <path id="marker-mid-tri" d="M902 548 L922 548 L912 530 Z" fill="none" stroke="#000" stroke-width="3.5" opacity="0"/>
        </g>
        <g id="text-mid-deploying" opacity="1">
          <text id="text-mid-deploying-l1" x="933" y="534" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">Deploying backend</text>
          <text id="text-mid-deploying-l2" x="933" y="558" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">from github</text>
        </g>
        <g id="text-mid-config" opacity="0">
          <text id="text-mid-config-l1" x="933" y="534" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">Configuring…</text>
          <text id="text-mid-config-l2" x="933" y="558" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">backend from github</text>
        </g>
        <g id="text-mid-deployed" opacity="0">
          <text id="text-mid-deployed-l1" x="933" y="534" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">Deployed</text>
          <text id="text-mid-deployed-l2" x="933" y="558" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">backend from github</text>
        </g>
      </g>

      <g id="label-bot" opacity="0">
        <g id="marker-bot">
          <circle id="marker-bot-ring" cx="912" cy="720" r="9" fill="none" stroke="#000" stroke-width="3.5"/>
          <path id="marker-bot-tri" d="M902 728 L922 728 L912 710 Z" fill="none" stroke="#000" stroke-width="3.5" opacity="0"/>
        </g>
        <g id="text-bot-deploying" opacity="1">
          <text id="text-bot-deploying-l1" x="933" y="714" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">Deploying postgres</text>
          <text id="text-bot-deploying-l2" x="933" y="738" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">docker image</text>
        </g>
        <g id="text-bot-config" opacity="0">
          <text id="text-bot-config-l1" x="933" y="714" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">Configuring…</text>
          <text id="text-bot-config-l2" x="933" y="738" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">postgres docker image</text>
        </g>
        <g id="text-bot-deployed" opacity="0">
          <text id="text-bot-deployed-l1" x="933" y="714" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">Deployed</text>
          <text id="text-bot-deployed-l2" x="933" y="738" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">postgres docker image</text>
        </g>
      </g>

      <g id="summary" opacity="0">
        <line x1="912" y1="554" x2="912" y2="900" stroke="#000" stroke-width="1.3"/>
        <circle cx="912" cy="922" r="4" fill="#000"/>
        <text id="text-sum-1" x="930" y="928" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">frontend</text>
        <circle cx="912" cy="958" r="4" fill="#000"/>
        <text id="text-sum-2" x="930" y="964" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">github backend</text>
        <circle cx="912" cy="994" r="4" fill="#000"/>
        <text id="text-sum-3" x="930" y="1000" font-family="ui-monospace, SF Mono, monospace" font-size="20" fill="#000">postgres docker image</text>
      </g>
    </svg>
    <img id="ref-img" src="reference/0001.png" alt="figma reference" style="opacity: 0.4;"/>
   </div>
  </div>

  <div class="controls">
    <div class="group">
      <span>Frame</span>
      <button data-frame="1">1</button>
      <button data-frame="2">2</button>
      <button data-frame="3">3</button>
      <button data-frame="4">4</button>
      <button data-frame="5">5</button>
      <button data-frame="6">6</button>
      <button data-frame="7">7</button>
      <button data-frame="8">8</button>
      <button data-frame="9">9</button>
      <button data-frame="10">10</button>
    </div>
    <div class="group">
      <span>t (s)</span>
      <input id="t-input" type="number" min="0" max="30" step="0.05" value="0"/>
    </div>
    <div class="group">
      <span>Onion skin</span>
      <input id="ref-opacity" type="range" min="0" max="1" step="0.05" value="0.4"/>
    </div>
    <div class="group">
      <button id="play-once">Play once</button>
      <button id="loop-toggle">Loop</button>
    </div>
    <div class="group">
      <a href="index.html">← back</a>
    </div>
  </div>

  <pre id="frame-times-out"></pre>

  <script src="vendor/gsap.min.js"></script>
  <script src="timeline.js"></script>
  <script>
  const refImg     = document.getElementById('ref-img');
  const refOpacity = document.getElementById('ref-opacity');
  const tInput     = document.getElementById('t-input');
  const frameBtns  = [...document.querySelectorAll('button[data-frame]')];
  const playOnce   = document.getElementById('play-once');
  const loopBtn    = document.getElementById('loop-toggle');
  const ftOut      = document.getElementById('frame-times-out');

  let activeFrame = null;
  const pad = (n) => String(n).padStart(4, '0');

  function setFrame(n) {
    activeFrame = n;
    refImg.src = `reference/${pad(n)}.png`;
    const t = window.FRAME_TIMES[n];
    tl.pause();
    tl.seek(t);
    tInput.value = t.toFixed(2);
    frameBtns.forEach(b => b.classList.toggle('active', parseInt(b.dataset.frame, 10) === n));
    ftOut.textContent = 'FRAME_TIMES = ' + JSON.stringify(window.FRAME_TIMES, null, 2);
  }

  frameBtns.forEach(b => b.addEventListener('click', () => setFrame(parseInt(b.dataset.frame, 10))));
  tInput.addEventListener('input', () => {
    const t = parseFloat(tInput.value) || 0;
    tl.pause(); tl.seek(t);
  });
  refOpacity.addEventListener('input', () => { refImg.style.opacity = refOpacity.value; });
  playOnce.addEventListener('click', () => { tl.repeat(0); tl.restart(); });
  loopBtn.addEventListener('click',  () => { tl.repeat(-1); tl.restart(); });

  setFrame(1);
  </script>
</body>
</html>
